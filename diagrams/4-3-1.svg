<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520" role="img" aria-label="9v9 pitch 4-3-1">
  <style>
    .pitch { fill:#2b7a2b; stroke:#fff; stroke-width:4; rx:12; ry:12 }
    .line { stroke:#fff; stroke-width:3; fill:none }
    .goal { fill:#ddd }
    .player { cursor:move; }
    .team { fill:#1e90ff; stroke:#fff; stroke-width:2 }
    .label { fill:#fff; font-family:Verdana, sans-serif; font-size:12px; pointer-events:none; }
    .title { fill:#fff; font-family:Verdana, sans-serif; font-size:14px }
  </style>

  <!-- pitch -->
  <rect x="10" y="10" width="880" height="500" class="pitch"/>
  <line x1="450" y1="10" x2="450" y2="510" class="line"/>
  <circle cx="450" cy="260" r="60" class="line"/>
  <rect x="0" y="210" width="10" height="100" class="goal"/>
  <rect x="890" y="210" width="10" height="100" class="goal"/>
  <rect x="10" y="170" width="120" height="180" class="line"/>
  <rect x="770" y="170" width="120" height="180" class="line"/>

  <!-- title -->
  <text x="30" y="40" class="title">9v9 — 4-3-1 (GK, 2 CB, 2 WB, 3 CM, 1 ST)</text>

  <!-- Players: numbers are editable; move <g transform="translate(x,y)"> to change positions -->
  <!-- GK -->
  <g class="player" transform="translate(60,260)">
    <circle r="16" class="team"/>
    <text x="-4" y="6" class="label">1</text>
  </g>

  <!-- Defenders: 2 center-backs + 2 wingbacks -->
  <g class="player" transform="translate(160,130)">
    <circle r="14" class="team"/>
    <text x="-5" y="5" class="label">2</text>
  </g>
  <g class="player" transform="translate(160,210)">
    <circle r="14" class="team"/>
    <text x="-5" y="5" class="label">3</text>
  </g>
  <g class="player" transform="translate(160,310)">
    <circle r="14" class="team"/>
    <text x="-5" y="5" class="label">4</text>
  </g>
  <g class="player" transform="translate(160,390)">
    <circle r="14" class="team"/>
    <text x="-5" y="5" class="label">5</text>
  </g>

  <!-- Midfielders (3 central) -->
  <g class="player" transform="translate(340,160)">
    <circle r="14" class="team"/>
    <text x="-5" y="5" class="label">6</text>
  </g>
  <g class="player" transform="translate(340,260)">
    <circle r="14" class="team"/>
    <text x="-5" y="5" class="label">7</text>
  </g>
  <g class="player" transform="translate(340,360)">
    <circle r="14" class="team"/>
    <text x="-5" y="5" class="label">8</text>
  </g>

  <!-- Striker (1) -->
  <g class="player" transform="translate(540,260)">
    <circle r="14" class="team"/>
    <text x="-5" y="5" class="label">9</text>
  </g>
</svg>